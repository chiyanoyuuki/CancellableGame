name: Build Android APK

# Compile un APK à chaque push (et en manuel). L'APK se télécharge depuis
# l'onglet Actions (artifact), et en plus une Release est créée si vous poussez
# un tag "v*" (ex: v1.0.0) — pratique pour avoir un lien stable sur le téléphone.

on:
  push:
    branches: ['main', 'claude/**']
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write # nécessaire pour créer une Release sur un tag

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Évalué ici pour pouvoir l'utiliser dans les `if:` ci-dessous.
      HAS_KEYSTORE: ${{ secrets.SIGNING_KEYSTORE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Numéro de version = numéro de build (pour que les MAJ s'installent)
        run: |
          node -e "const fs=require('fs');const p='app.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.expo.android=j.expo.android||{};j.expo.android.versionCode=Number(process.env.GITHUB_RUN_NUMBER)||1;fs.writeFileSync(p,JSON.stringify(j,null,2));console.log('versionCode =',j.expo.android.versionCode);"

      - name: Générer le projet Android (expo prebuild)
        run: npx expo prebuild --platform android --no-install

      - name: Plus de mémoire pour Gradle (évite l'erreur « Java heap space »)
        # Le projet android/ est régénéré à chaque build par prebuild : on augmente
        # donc le tas de la JVM Gradle ICI, après la génération. La dernière valeur
        # de org.gradle.jvmargs dans le fichier l'emporte, ce qui remplace le
        # défaut (2 Go) devenu trop juste pour :app:collectReleaseDependencies.
        run: |
          {
            echo ""
            echo "org.gradle.jvmargs=-Xmx6144m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8"
          } >> android/gradle.properties

      - name: Compiler l'APK release
        run: |
          chmod +x android/gradlew
          (cd android && ./gradlew :app:assembleRelease --no-daemon)

      - name: Signer l'APK avec le keystore (si configuré)
        if: env.HAS_KEYSTORE == 'true'
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
          SIGNING_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          BT=$(ls -d "$ANDROID_SDK_ROOT"/build-tools/*/ | sort -V | tail -1)
          "${BT}zipalign" -p -f 4 android/app/build/outputs/apk/release/app-release.apk "$RUNNER_TEMP/aligned.apk"
          "${BT}apksigner" sign \
            --ks "$RUNNER_TEMP/release.keystore" \
            --ks-pass "pass:$SIGNING_KEYSTORE_PASSWORD" \
            --ks-key-alias "$SIGNING_KEY_ALIAS" \
            --key-pass "pass:$SIGNING_KEY_PASSWORD" \
            --out soiree.apk "$RUNNER_TEMP/aligned.apk"
          "${BT}apksigner" verify --print-certs soiree.apk

      - name: Récupérer l'APK signé par défaut (pas de keystore configuré)
        if: env.HAS_KEYSTORE != 'true'
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk soiree.apk
          echo "::warning::Pas de keystore (secret SIGNING_KEYSTORE_BASE64). L'APK est signé avec la clé de debug standard : il s'installe et se met à jour entre builds, mais pour la sécurité (et un éventuel Play Store) ajoutez un vrai keystore. Voir README."

      - name: Publier l'artifact (téléchargeable depuis l'onglet Actions)
        uses: actions/upload-artifact@v4
        with:
          name: soiree-apk-${{ github.run_number }}
          path: soiree.apk
          retention-days: 30

      - name: Publier l'APK dans une Release permanente « android-latest »
        # Lien de téléchargement DIRECT, stable et installable depuis le
        # téléphone. Contrairement aux artifacts (onglet Actions), une Release
        # n'expire pas, se télécharge sans être connecté et reste visible depuis
        # l'app / le navigateur mobile. Lien fixe :
        #   https://github.com/<owner>/<repo>/releases/download/android-latest/soiree.apk
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view android-latest >/dev/null 2>&1 \
            || gh release create android-latest \
                 --title "Cancellable — dernier APK Android" \
                 --notes "APK auto-généré au dernier push sur main. Installe-le directement depuis le téléphone."
          gh release upload android-latest soiree.apk --clobber

      - name: Créer une Release (si tag v*)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" soiree.apk --title "Soirée ${GITHUB_REF_NAME}" --notes "APK généré automatiquement"
